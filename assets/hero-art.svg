<svg width="980" height="760" viewBox="0 0 980 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Solar research artwork</title>
  <desc id="desc">A warm solar scene with orbital paths, data points, and a central sun.</desc>
  <defs>
    <linearGradient id="bg" x1="86" y1="58" x2="872" y2="702" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7EB"/>
      <stop offset="1" stop-color="#F7E8D4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(492 318) scale(170)">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="48%" stop-color="#F4B45F"/>
      <stop offset="100%" stop-color="#D8672C"/>
    </radialGradient>
    <linearGradient id="orbit" x1="258" y1="230" x2="758" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2940" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6E88A6" stop-opacity="0.65"/>
    </linearGradient>
    <filter id="soft" x="0" y="0" width="980" height="760" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="980" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="760" cy="132" r="98" fill="#F2B35D" opacity="0.12" filter="url(#soft)"/>
  <circle cx="180" cy="610" r="142" fill="#6E88A6" opacity="0.10" filter="url(#soft)"/>
  <circle cx="520" cy="324" r="198" fill="#F6C98E" opacity="0.18" filter="url(#soft)"/>

  <ellipse cx="492" cy="320" rx="286" ry="140" stroke="url(#orbit)" stroke-width="5"/>
  <ellipse cx="492" cy="320" rx="286" ry="140" stroke="#F2B35D" stroke-width="1.6" opacity="0.55" transform="rotate(-18 492 320)"/>
  <ellipse cx="492" cy="320" rx="286" ry="140" stroke="#1A2940" stroke-width="1.6" opacity="0.14" transform="rotate(24 492 320)"/>
  <ellipse cx="492" cy="320" rx="286" ry="140" stroke="#D8672C" stroke-width="1.2" opacity="0.3" transform="rotate(58 492 320)"/>

  <circle cx="492" cy="320" r="160" fill="url(#sun)"/>
  <circle cx="492" cy="320" r="104" fill="#FFF8ED" opacity="0.28"/>
  <circle cx="492" cy="320" r="38" fill="#FFF8ED" opacity="0.48"/>

  <circle cx="744" cy="194" r="11" fill="#1A2940" opacity="0.8"/>
  <circle cx="236" cy="500" r="9" fill="#1A2940" opacity="0.55"/>
  <circle cx="322" cy="172" r="6" fill="#1A2940" opacity="0.45"/>
  <circle cx="666" cy="510" r="6" fill="#F7D998" opacity="0.9"/>
  <circle cx="564" cy="150" r="5" fill="#F7D998" opacity="0.9"/>

  <path d="M150 620C250 568 343 540 438 520" stroke="#6E88A6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M640 562C716 536 784 486 840 426" stroke="#6E88A6" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M188 206C250 186 305 180 357 180" stroke="#D8672C" stroke-width="4" stroke-linecap="round" opacity="0.35"/>

  <g opacity="0.85">
    <rect x="74" y="70" width="190" height="86" rx="22" fill="#FFFDF8" fill-opacity="0.66" stroke="#1A2940" stroke-opacity="0.08"/>
    <rect x="708" y="594" width="198" height="86" rx="22" fill="#FFFDF8" fill-opacity="0.66" stroke="#1A2940" stroke-opacity="0.08"/>
  </g>

  <text x="108" y="105" fill="#1A2940" font-size="18" font-family="Georgia, serif" font-weight="700">Solar flows</text>
  <text x="108" y="132" fill="#5E6A7B" font-size="13" font-family="Avenir Next, Segoe UI, sans-serif">Magnetism, dynamics, inference</text>
  <text x="742" y="630" fill="#1A2940" font-size="18" font-family="Georgia, serif" font-weight="700">Public portfolio</text>
  <text x="742" y="657" fill="#5E6A7B" font-size="13" font-family="Avenir Next, Segoe UI, sans-serif">Research, talks, datasets</text>
</svg>
